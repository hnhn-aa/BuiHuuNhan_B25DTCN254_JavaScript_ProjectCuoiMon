<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Manager</title>
    <link rel="stylesheet" href="../CSS/article-manager.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body id="totalProgram">
    <div class="layout" id="layout">

        <div class="sidebar">
            <button class="menu" id="manager-user">🧑 Manage Users</button>
            <button class="menu" id="manager-entries">📄 Manage Entries</button>
            <button class="menu active" id="manager-articles">📘 Manage Articles</button>
            <button class="menu logout" id="logout">🚪 Log out</button>
        </div>
        
        <div class="main" id="main">
            
            <div class="header">
                <div></div>
                <div class="header-right">
                    <span class="icon">✉️ 🔔</span>
                    <img src="../assets/images/article-details/avatar.png" class="avatar">
                </div>
            </div>
            
            <div class="content">
                
                <h2>Quản lý bài viết</h2>
                
                <button class="btn-add" id="btnAdd">Thêm mới bài viết</button>
                
                <table>
                    <thead>
                        <tr>
                            <th>Ảnh</th>
                            <th>Tiêu đề</th>
                            <th>Chủ đề</th>
                            <th>Nội dung</th>
                            <th>Trạng thái</th>
                            <th>Chỉnh sửa trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    
                    <tbody id="article-list">
                        <!-- <tr>
                            <td><img src="../assets/images/article-details/image12.jpg"></td>
                            <td>Học nấu cá sốt cà chua</td>
                            <td>Nấu ăn</td>
                            <td>tôi đã học được cách nấu ăn...</td>
                            <td><span class="status public">Public</span></td>
                            <td>
                                <select>
                                    <option>Public</option>
                                    <option>Private</option>
                                </select>
                            </td>
                            <td>
                                <button class="btn edit">Sửa</button>
                                <button class="btn delete">Xóa</button>
                            </td>
                        </tr>
                        
                        <tr>
                            <td><img src="../assets/images/article-details/image11.jpg"></td>
                            <td>Bí kíp viết CV ngành IT</td>
                            <td>IT</td>
                            <td>Chia sẻ cách viết CV ấn tượng...</td>
                            <td><span class="status private">Private</span></td>
                            <td>
                                <select>
                                    <option>Private</option>
                                    <option>Public</option>
                                </select>
                            </td>
                            <td>
                                <button class="btn edit">Sửa</button>
                                <button class="btn delete">Xóa</button>
                            </td>
                        </tr> -->
                    </tbody>
                </table>
                
                <div class="pagination">
                    <button>← Previous</button>
                    
                    <div class="pages">
                        <!-- <span class="active">1</span>
                        <span>2</span>
                        <span>3</span>
                        <span>...</span>
                        <span>8</span>
                        <span>9</span>
                        <span>10</span> -->
                    </div>
                    
                    <button>Next →</button>
                </div>
                
            </div>
        </div>
    </div>
    <div id="container">
        <div class="modal">

            <div class="header">
                <h2 id="Title">📝 Add New Article</h2>
                <span class="close-btn" id="btnClose">✖</span>
            </div>
            
            <form class="form" id="articleForm">
                
                <div class="form-group">
                    <label>Title:</label>
                    <input type="text" id="title">
                    <small class="error"></small>
                </div>
                
                <div class="form-group">
                    <label>Article Categories:</label>
                    <select id="entries">
                        
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Mood:</label>
                    <select id="mood">
                        <option value="🙂 Happy">🙂 Happy</option>
                        <option value="😢 Sad">😢 Sad</option>
                        <option value="😡 Angry">😡 Angry</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Content:</label>
                    <textarea rows="5" id="content"></textarea>
                    <small class="error"></small>
                </div>
                
                <div class="form-group">
                    <label>Status:</label>
                    <div class="status" id="status">
                        <label><input type="radio" name="status" value="public"> Public</label>
                        <label><input type="radio" name="status" value="private"> Private</label>
                    </div>
                </div>
                
                <div class="upload">
                    <div class="upload-box">
                        <input type="file" class="file" id="file" >
                        <p>⬆️ <br>Browse and choose the files you want to upload from your computer</p>
                    </div>
                </div>
                
                <button class="btn-add1" id="btn-add-article">Add</button>
                <button class="btn-add1" id="btn-update-article">Update</button>

            </form>
        </div>
    </div>
    <script src="../JavaScript/article_manager.js"></script>
</body>
</html>
