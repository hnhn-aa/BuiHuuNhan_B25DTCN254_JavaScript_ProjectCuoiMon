<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../CSS/login.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="body">
        <img src="../assets/images/Login/image1.png" alt="image1" class="big-image">
        <form id="form">
                <div class="banner">
                <p>Sign in with</p>
                    <p class="Facebook">
                        <img src="../assets/icons/Symbol (3).png" alt="Facebook">
                    </p>
                    <p class="twister">
                        <img src="../assets/icons/Symbol.png" alt="twister">
                    </p>
                    <p class="in">
                        <img src="../assets/icons/Symbol (1).png" alt="in">
                    </p>
                </div>
                
                <p>Or</p>
                
                <div class="input-email">
                    <input type="text" placeholder="Enter a valid email address" id="email">
                    <p>Email address</p>
                </div>
                
                <div class="input-password">
                    <input type="password" placeholder="Enter password" id="password">
                    <p>Password</p>
                </div>
                
                <button class="login" id="btn-login">Login</button>
                <div class="register">
                    <p>Don't have an account? </p>
                    <a href="./register.html" class="register-link">Register</a>
                </div>
        </form>
    </div>

    <footer class="footer">
        <p>Copyright © 2025. All rights reserved.</p>
        <div class="icons">
            <p class="Facebook">
                <img src="../assets/icons/Symbol (3).png" alt="Facebook">
            </p>
            <p class="twister">
                <img src="../assets/icons/Symbol.png" alt="twister">
            </p>
            <p class="Google">
                <img src="../assets/icons/Symbol (2).png" alt="Google">
            </p>
            <p class="in">
                <img src="../assets/icons/Symbol (1).png" alt="in">
            </p>
        </div>
    </footer>

    <script src="../JavaScript/login.js"></script>
</body>
</html>
